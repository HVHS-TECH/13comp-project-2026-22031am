<!DOCTYPE html>
<html lang="en">
<head>
    <title>13COMP firebase</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- stylesheets *******************************************-->
    <link rel="stylesheet" type="text/css" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" type="text/css" href="./css/style.css">

    <!-- Google Font *******************************************-->
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

    <!-- firebase start ****************************************-->
    <link type="text/css" rel="stylesheet" href="https://cdn.firebase.com/libs/firebaseui/3.5.2/firebaseui.css" />
    <!-- firebase end ******************************************-->
</head>

<!--*************************************************************
  BODY
**************************************************************-->
<body style="
    margin: 0; 
    min-height: 100vh; 
    background-image: url('./assets/background/gravbackg.jpg'); 
    background-size: cover; 
    background-position: center; 
    background-repeat: no-repeat;
    font-family: 'Luckiest Guy', cursive;
">

  <header class="container w3-center">

    <div class="w3-center" style="
        padding: 20px; 
        margin-top: 40px; 
        background-color: rgba(0,0,0,0.6); 
        display: inline-block;
        max-width: 650px;
        position: relative;
        border-radius: 20px;

        /* ⭐ TRUE VISIBLE DOTTED GRADIENT BORDER ⭐ */
        border: 9px dotted transparent;
        background: 
            linear-gradient(45deg, #00eaff, #ff00ff, #8a2be2) border-box,
            rgba(0,0,0,0.6) padding-box;
        background-clip: padding-box, border-box;

        /* glow */
        box-shadow: 0 0 25px #00eaff;
    ">

      <!--  COIN ICON(TOP LEFT) -->
      <img src="./assets/images/coin.png" alt="coin" style="
          position: absolute;
          top: -35px;
          left: -35px;
          width: 70px;
          filter: drop-shadow(0 0 8px gold);
      ">

      <!--  DIAMOND ICON (TOP RIGHT) -->
      <img src="./assets/images/diamond.png" alt="diamond" style="
          position: absolute;
          top: -35px;
          right: -35px;
          width: 70px;
          filter: drop-shadow(0 0 8px cyan);
      ">

      <h1 class="w3-center" style="
          font-size: 50px; 
          color: #39ffb6;
          margin-bottom: 10px;
          text-shadow: 0 0 12px #39ffb6;
      ">
        WELCOME TO ADITI'S GAME PROJECT!!
      </h1>

      <div class="w3-container w3-center" style="margin-top: 20px; font-size: 38px;">

        <!-- LOGIN BUTTON -->
        <button onclick="fb_authenticate()" style="
            background-color: #0a1a40;
            border: 3px dotted #39ffb6;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 24px;
            font-weight: bold;
            color: #39ffb6;
            cursor: pointer;
            box-shadow: 0 0 15px #39ffb6;
            transition: 0.3s;
        ">LOGIN</button>

        <!-- LOOP TEXT PANEL -->
        <div style="
            margin-top: 20px;
            padding: 10px 25px;
            background-color: rgba(0,0,0,0.6);
            border-radius: 40px;
            font-size: 22px;
            color: #39ffb6;
            font-weight: bold;
            display: inline-block;
            border: 2px dotted #39ffb6;
            box-shadow: 0 0 12px #39ffb6;
        ">
          PLEASE PRESS THE LOGIN BUTTON TO LOGIN!
        </div>

      </div>
    </div>
  </header>

  <button onclick="window.location.href='html/ad_manager.html'" style="
    font-size: 24px;
    padding: 12px 25px;
">
  Admin Panel
</button>


  <!-- Your JS files & main module ***************************-->
  <script type="module" src="./main.mjs"></script>
</body>
</html>

<!--*************************************************************
  END OF INDEX.HTML
**************************************************************-->

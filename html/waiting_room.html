    <title> Waiting room </title>

</head>

<body>
    <div class="waiting-container">

        <h1 class="waiting-title">
            Waiting for another player...
        </h1>

        <h2 id="lobby-name" class="lobby-name-text"></h2>

        <div class="players-row">

            <!-- HOST --> 
             <div class="player-box">
                <p id="host-name"> Host </p>

                <img id="host-photo"
                    class="player-photo">

             </div>

             <!-- GUEST --> 
              <div class="player-box">

                <p id="guest-name"> Waiting... </p>
              <img id="guest-photo"
                    class="player-photo">

              </div>
            </div>

            <h3 id="status-text"> Waiting for opponent... </h3>
            
            <button onclick="window.location.href='lobby.html'">
                Leave game
            </button>
        
        </div>


    <script type="module" src="../games/waiting_room.mjs">  
    </script>

</body>

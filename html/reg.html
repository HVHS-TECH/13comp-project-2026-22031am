<!DOCTYPE html>
<html lang="en">
<head>
  <title>12COMP firebase</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- stylesheets -->
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <link rel="stylesheet" href="../css/style.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet"> <!-- futuristic game font -->

  <!-- firebase start ****************************************-->
  <link rel="stylesheet" href="https://cdn.firebase.com/libs/firebaseui/3.5.2/firebaseui.css" />
  <!-- firebase end ******************************************-->
</head>

<body class="reg-background">

<!-- =========================
      //HEADER (GAME STYLE PANEL)
========================= -->
<header class="reg-header">
  <div class="reg-header-box">

    <!-- avatar icon floating -->
    <img src="../assets/images/avatar-icon.png" 
         alt="Player icon" 
         class="avatar" />

    <!-- glowing game title -->
    <h1 class="main-title">
      REGISTRATION FORM!
    </h1>

    <!-- subtitle -->
    <p class="subtitle">
      Please enter your details below to create your player profile!!
    </p>

  </div>
</header>

<!-- =========================
      //REG FORM
========================= -->
<form id="f_userDetails">

  <div class="form-container">

    <!-- GENERAL INFORMATION -->
    <div class="form-section">

      <!-- extra metal corners -->
      <span class="corner tr"></span> <!-- top right metal corner -->
      <span class="corner bl"></span> <!-- bottom left metal corner -->

      <h2>🛡️ GENERAL INFORMATION</h2>

      <label for="i_displayName">displayName:</label><br />
      <input type="text" id="i_displayName" name="i_displayName" required minlength="3" maxlength="12" />

      <label for="i_age">Age:</label><br />
      <input type="number" id="i_age" name="i_age" min="1" max="100" required />

      <label for="i_sex">Sex:</label><br />
      <select id="i_sex" name="i_sex" required>
        <option value="">-- Please select --</option>
        <option value="female">Female</option>
        <option value="male">Male</option>
        <option value="prefer not to say">Prefer not to say</option>
      </select>
    </div>

    <!-- CONTACT DETAILS -->
    <div class="form-section">

      <!--  metal corners for both the sections -->
      <span class="corner tr"></span> <!-- top right metal corner for the section -->
      <span class="corner bl"></span> <!-- bottom left metal corner for the section -->

      <h2>✉️ CONTACT DETAILS</h2>

      <label for="i_email">Email:</label><br />
      <input type="email" id="i_email" name="i_email" required />

      <label for="i_phone">Phone Number:</label><br />
      <input type="tel" id="i_phone" name="i_phone" placeholder="123-45-678"
             pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" required />
      <small>Format: 123-45-678</small>

      <script>
function validateForm() {
    var name = document.forms["f_userDetails"]["i_phone"].value;
    if (name == "") {
        alert(" Phone number must be filled and follow the format 123-45-678");
        return false; // Prevents the form submission
    }
}
</script>

    </div>

  </div>

  <!-- REGISTER BUTTON -->
  <div style="text-align: center; margin-top: 15px;">
    <button id="registerBtn" type="button">
      REGISTER
    </button>
  </div>

</form>

<script type="module" src="../reg.mjs"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Guess the Number game</title>
  <meta charset="UTF-8">
  <meta name="viewport"  content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="assets/images/fruitcatcher.jpg">
  
  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/GTN.css">

  <!-- P5.js & P5.play ***************************************-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.4/p5.min.js"
  crossorigin="anonymous"
  referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"
  crossorigin="anonymous"
  referrerpolicy="no-referrer"></script>

  <!-- p5play v3 — hosted on official site *******************-->
<script src="https://p5play.org/v3/planck.min.js"></script
<script src="https://p5play.org/v3/p5play.js"></script>
  
   <!-- JQUERY ************************************************-->
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
 


<body>

    <!-- MAIN CONTAINER ***********************************************-->
     <div class="game-container">

      
    <!-- TITLE ***********************************************-->
     <h1 class="title"> GUESS THE NUMBER </h1>

    <!-- RANGE BOX ***********************************************-->
      <div class="range-box">
      I'm thinking of a number between 
    <span> 1-100 </span>
   </div>

    <!-- MAIN CONTENT ***********************************************-->
     <div class="main-content">
      
    <!-- PLAYERS ***********************************************-->
     <div class="players-panel">

      <h2> PLAYERS </h2>

      <div class="player-card host">
        <h3> Player 1</h3>
        <p> (Host) </p>
        <div class="connected"> Connected </div>
      </div>

      <div class ="player-card guest">
        <h3> Player 2 </h3>
        <p> (Guest) </p>
        <div class="connected"> Connected</div>
      </div>
     </div>

    <!-- GAME STATUS ***********************************************-->

     <div class="status-panel"> 

      <h2> GAME STATUS </h2>

      <div class="turn-box">
        Your turn, <br> 
        take a guess!
      
      </div>

      <!-- LAST RESULT ***********************************************-->
       <div class="result-box">
        Make a guess to see the result! 
       </div>

       <!-- GUESS INPUT  ***********************************************-->
      <div class="guess-section">
        <label> Enter your guess (1-100) </label>

        <div class="guess-row">
          <input type="number" placeholder="Enter your number...">
          <button> SUBMIT YOUR GUESS! </button>
        </div>
      </div>
    </div>
  </div> 
</div>

  <script type="module" src="../games/gtn_game.mjs"></script>
</body>
</html>

<!--*************************************************************
  END OF GTN_game.html
**************************************************************-->

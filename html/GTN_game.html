<!DOCTYPE html>
<html lang="en">
<head>
  <title>Guess the Number game</title>
  <meta charset="UTF-8">
  <meta name="viewport"  content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="assets/images/fruitcatcher.jpg">
  
  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="css/style.css">

  <!-- P5.js & P5.play ***************************************-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.4/p5.min.js"
  crossorigin="anonymous"
  referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"
  crossorigin="anonymous"
  referrerpolicy="no-referrer"></script>

  <!-- p5play v3 — hosted on official site *******************-->
<script src="https://p5play.org/v3/planck.min.js"></script>
<script src="https://p5play.org/v3/p5play.js"></script>
  
   <!-- JQUERY ************************************************-->
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
 
  <!-- MY CODE ***********************************************-->
  <script src="../games/gtn_game.mjs"></script>
  </head>

<body>

    <!-- MAIN CONTAINER ***********************************************-->
     <div class=""game-container">

      
    <!-- TITLE ***********************************************-->
     <h1 class="title"> GUESS THE NUMBER </h1>

    <!-- RANGE BOX ***********************************************-->
      <div class=""range-box">
      I'm thinking of a number between 
    <span> 1-100 </span>
   </div>

    <!-- MAIN CONTENT ***********************************************-->
     <div class=""main-content">
      
    <!-- PLAYERS ***********************************************-->
     <div class="players-panel">

      <h2> PLAYERS </h2>

      <div class="player-card host">
        <h3> Player 1</h3>
        <p> (Host) </p>
        <div class="connected"> Connected </div>
      </div>

      <div class ="player-card guest">
        <h3> Player 2 </h3>
        <p> (Guest) </p>
        <div class=""connected"> Connected</div>
      </div>
     </div>

    <!-- GAME STATUS ***********************************************-->

     <div class="status-panel"> 

      <h2> GAME STATUS </h2>

      <div class="turn-box">
        Your turn, <br> 
        take a guess!
      
      </div>

      <!-- GAME STATUS ***********************************************-->


      <h3> You are connected to the status panel </h3>
      
      </div>
     </div>
    
    
    </div>
    
   


</body>





</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <title>GTN Lobby</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" type="text/css"
    href="https://www.w3schools.com/w3css/4/w3.css">

  <link rel="stylesheet" type="text/css"
    href="../css/lobby.css">

  <!-- Google Font *******************************************-->
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body class="game-selection-bg">

  <!-- TOP NAV BAR *******************************************-->
  <div class="nav-wrapper" style="padding: 10px 0;">

    <div class="nav-bar-sci">

      <div onclick="window.location.href='instructionsGTN.html'">
        GTN: GUESS THE NUMBER GAME
      </div>

      <div onclick="window.location.href='instructionsFC.html'">
        FRUIT CATCHER
      </div>

      <div onclick="window.location.href='../index.html'">
        BACK TO THE HOME PAGE
      </div>

      <div onclick="window.location.href='reg.html'">
        BACK TO THE REGISTRATION PAGE
      </div>

      <div onclick="window.location.href='about.html'">
        ABOUT
      </div>

    </div>
  </div>

  <!-- ADMIN BUTTON *******************************************-->
  <button
    onclick="window.location.href='ad_manager.html'"
    class="admin-btn">

    Admin Panel

  </button>

  <!-- MAIN LOBBY *******************************************-->
  <div class="lobby-main-container">

    <!-- TITLE *******************************************-->
    <h1 class="active-title">
      ACTIVE LOBBIES
    </h1>

    <!-- CREATE LOBBY SECTION *******************************************-->
    <div class="create-lobby-section">

      <!-- LOBBY NAME INPUT -->
      <input
        type="text"
        id="lobby-name-input"
        placeholder="Please enter a lobby name..."
        maxlength="20">

      <!-- CREATE BUTTON -->
      <button id="create-lobby-btn">
        CREATE LOBBY
      </button>

    </div>

    <!-- LOBBY LIST *******************************************-->
    <div id="lobby-list" class="players-list"></div>

  </div>

  <!-- JAVASCRIPT *******************************************-->
  <script type="module" src="../games/lobby.mjs"></script>

</body>

</html>
